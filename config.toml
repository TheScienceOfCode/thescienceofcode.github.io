baseURL = "https://thescienceofcode.com/"
title = "The Science of Code"
theme = "hugoplate"
timeZone = "America/Bogota"
languageCode = "en-us"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false
summaryLength = 24
hasCJKLanguage = false
canonifyURLs = false

[services]
  [services.disqus]
    shortname = ""

[pagination]
  pagerSize = 6
  path = "page"

[build]
  [build.buildStats]
    enable = true
  [[build.cachebusters]]
    source = "assets/notwatching/hugo_stats\\.json"
    target = "css"

[module]
  [[module.mounts]]
    source = "assets"
    target = "assets"
  [[module.mounts]]
    disableWatch = true
    source = "hugo_stats.json"
    target = "assets/notwatching/hugo_stats.json"
  [[module.imports]]
    path = "github.com/gethugothemes/hugo-modules/search"
  [[module.imports]]
    path = "github.com/gethugothemes/hugo-modules/pwa"
  [[module.imports]]
    path = "github.com/gethugothemes/hugo-modules/images"
  [[module.imports]]
    path = "github.com/gethugothemes/hugo-modules/videos"
  [[module.imports]]
    path = "github.com/gethugothemes/hugo-modules/icons/font-awesome"
  [[module.imports]]
    path = "github.com/gethugothemes/hugo-modules/gzip-caching"
  [[module.imports]]
    path = "github.com/gethugothemes/hugo-modules/adsense"
  [[module.imports]]
    path = "github.com/gethugothemes/hugo-modules/accordion"
  [[module.imports]]
    path = "github.com/gethugothemes/hugo-modules/table-of-contents"
  [[module.imports]]
    path = "github.com/gethugothemes/hugo-modules/tab"
  [[module.imports]]
    path = "github.com/gethugothemes/hugo-modules/modal"
  [[module.imports]]
    path = "github.com/gethugothemes/hugo-modules/gallery-slider"
  [[module.imports]]
    path = "github.com/gethugothemes/hugo-modules/components/preloader"
  [[module.imports]]
    path = "github.com/gethugothemes/hugo-modules/components/social-share"
  [[module.imports]]
    path = "github.com/gethugothemes/hugo-modules/components/cookie-consent"
  [[module.imports]]
    path = "github.com/gethugothemes/hugo-modules/components/announcement"
  [[module.imports]]
    path = "github.com/gethugothemes/hugo-modules/components/custom-script"
  [[module.imports]]
    path = "github.com/gethugothemes/hugo-modules/components/render-link"
  [[module.imports]]
    path = "github.com/gethugothemes/hugo-modules/shortcodes/button"
  [[module.imports]]
    path = "github.com/gethugothemes/hugo-modules/shortcodes/notice"
  [[module.imports]]
    path = "github.com/gethugothemes/hugo-modules/shortcodes/mermaid"
  [[module.imports]]
    path = "github.com/gethugothemes/hugo-modules/seo-tools/basic-seo"
  [[module.imports]]
    path = "github.com/gethugothemes/hugo-modules/seo-tools/site-verifications"
  [[module.imports]]
    path = "github.com/gethugothemes/hugo-modules/seo-tools/google-tag-manager"

[outputs]
  home = ["HTML", "RSS", "WebAppManifest", "SearchIndex"]
  page = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML", "RSS"]
  term = ["HTML", "RSS"]

[imaging]
  quality = 80
  resampleFilter = "Lanczos"

[caches]
  [caches.images]
    dir = ":resourceDir/_gen"
    maxAge = "720h"
  [caches.assets]
    dir = ":resourceDir/_gen"
    maxAge = "720h"

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    style = "monokai"
    lineNumbersInTable = false
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 5
    ordered = true

[mediaTypes]
  [mediaTypes."application/manifest+json"]
    suffixes = ["webmanifest"]

[outputFormats]
  [outputFormats.WebAppManifest]
    mediaType = "application/manifest+json"
    rel = "manifest"
  [outputFormats.SearchIndex]
    mediaType = "application/json"
    baseName = "searchindex"
    isPlainText = true
    notAlternative = true

[taxonomies]
  tag = "tags"
  category = "categories"

[permalinks]
  post = "/post/:slug/"

[languages]
  [languages.en]
    languageName = "English"
    languageCode = "en-us"
    weight = 1
    title = "The Science of Code"
  [languages.es]
    languageName = "Español"
    languageCode = "es-co"
    weight = 2
    title = "The Science of Code"

[[menu.main]]
  name = "Home"
  url = "/"
  weight = 1
[[menu.main]]
  name = "Posts"
  url = "/post/"
  weight = 2
[[menu.main]]
  name = "Categories"
  url = "/categories/"
  weight = 3
[[menu.main]]
  name = "Tags"
  url = "/tags/"
  weight = 4

[[menu.footer]]
  name = "Posts"
  url = "/post/"
  weight = 1
[[menu.footer]]
  name = "Categories"
  url = "/categories/"
  weight = 2
[[menu.footer]]
  name = "Tags"
  url = "/tags/"
  weight = 3
[[menu.footer]]
  name = "GitHub"
  url = "https://github.com/TheScienceOfCode/thescienceofcode.github.io"
  weight = 4

[author]
  name = "The Science of Code"

[params]
  favicon = "/favicon.ico"
  logo = "images/the-science-of-code.png"
  logo_darkmode = "images/the-science-of-code.png"
  logo_width = "140px"
  logo_height = "auto"
  logo_webp = false
  logo_text = "The Science of Code"
  navbar_fixed = true
  theme_switcher = true
  theme_default = "system"
  mainSections = ["post"]
  google_tag_manager = ""
  google_adsense = ""
  custom_script = ""
  copyright = "The Science of Code is a Free and Open Source initiative by [Equilaterus](https://equilaterus.com/).<br>Our source code is available at <a href=\"https://github.com/TheScienceOfCode\"><u>GitHub</u></a> under GPL-3.0 License."

  [[params.plugins.css]]
    link = "plugins/swiper/swiper-bundle.css"
    lazy = true
  [[params.plugins.css]]
    link = "plugins/glightbox/glightbox.css"
    lazy = true
  [[params.plugins.css]]
    link = "plugins/font-awesome/v6/brands.css"
    lazy = true
  [[params.plugins.css]]
    link = "plugins/font-awesome/v6/solid.css"
    lazy = true
  [[params.plugins.css]]
    link = "plugins/font-awesome/v6/icons.css"
    lazy = true

  [[params.plugins.js]]
    link = "js/search.js"
    lazy = false
  [[params.plugins.js]]
    link = "plugins/swiper/swiper-bundle.js"
    lazy = false
  [[params.plugins.js]]
    link = "plugins/glightbox/glightbox.js"
    lazy = true
  [[params.plugins.js]]
    link = "js/gallery-slider.js"
    lazy = true
  [[params.plugins.js]]
    link = "plugins/cookie.js"
    lazy = false
  [[params.plugins.js]]
    link = "js/accordion.js"
    lazy = true
  [[params.plugins.js]]
    link = "js/tab.js"
    lazy = true
  [[params.plugins.js]]
    link = "js/modal.js"
    lazy = true
  [[params.plugins.js]]
    link = "plugins/youtube-lite.js"
    lazy = true

  [params.navigation_button]
    enable = false
    label = "GitHub"
    link = "https://github.com/TheScienceOfCode/thescienceofcode.github.io"

  [params.search]
    enable = true
    primary_color = "#121212"
    include_sections = ["post"]
    show_image = true
    show_description = true
    show_tags = true
    show_categories = true

  [params.announcement]
    enable = false
    expire_days = 7
    content = ""

  [params.metadata]
    keywords = ["programming", "gamedev", "linux", "cpp", "unreal", "raylib"]
    description = "Programming tutorials, Linux setup guides, and game development notes."
    author = "The Science of Code"
    twitter = "scienceofcode"
    image = "/images/tsoc-thumbnail.jpg"

  [params.site_verification]
    google = ""
    bing = ""
    baidu = ""
    facebook = ""
    mastodon = ""

  [params.cookies]
    enable = false
    expire_days = 60
    content = "This site uses cookies."
    button = "I Accept"

  [params.mermaid]
    js_url = "https://cdn.jsdelivr.net/npm/mermaid@latest/dist/mermaid.esm.min.mjs"

  [params.widgets]
    sidebar = ["categories", "tags"]

  [params.google_map]
    enable = false
    map_api_key = ""
    map_latitude = ""
    map_longitude = ""
    map_marker = ""

  [params.subscription]
    enable = false
    mailchimp_form_action = ""
    mailchimp_form_name = ""

[params.comment.utterances]
  enable = true
  repo = "TheScienceOfCode/discussions"
  issueTerm = "pathname"
  label = "discussion"
  theme = "github-light"
  crossorigin = "anonymous"

name: gh-pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.158.0"
          extended: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install theme dependencies
        working-directory: themes/hugoplate
        run: npm install

      - name: Link root node_modules
        run: ln -s themes/hugoplate/node_modules node_modules

      - name: Build site
        run: |
          export PATH="${{ github.workspace }}/themes/hugoplate/node_modules/.bin:$PATH"
          cd themes/hugoplate
          node scripts/themeGenerator.js
          cd ../..
          hugo --gc --minify

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages

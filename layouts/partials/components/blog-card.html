{{ $image := .Params.image | default .Params.coverImage }}
<article class="bg-body dark:bg-darkmode-body h-full rounded-2xl border border-transparent p-5 shadow-sm transition hover:-translate-y-1 hover:shadow-md">
  {{ if $image }}
    <a href="{{ .RelPermalink }}" class="mb-5 block overflow-hidden rounded-xl">
      <img
        src="{{ $image | relURL }}"
        alt="{{ .Title }}"
        class="h-52 w-full object-cover"
        loading="lazy" />
    </a>
  {{ end }}
  <div class="mb-3 flex flex-wrap gap-x-4 gap-y-2 text-sm text-text-light dark:text-darkmode-text-light">
    <span>{{ time.Format ":date_long" .PublishDate }}</span>
    {{ with .Params.categories }}
      <span>{{ delimit . ", " }}</span>
    {{ end }}
  </div>
  <h3 class="mb-3 h5">
    <a href="{{ .RelPermalink }}">{{ .Title }}</a>
  </h3>
  <p class="mb-5">{{ .Summary | plainify }}</p>
  <a class="btn btn-outline-primary btn-sm" href="{{ .RelPermalink }}">
    {{ T "read_more" | default "Read More" }}
  </a>
</article>
